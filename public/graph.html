<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Investigation graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__title">
        <a href="/" aria-label="Lookup" style="text-decoration: none; margin-left: 0.4rem; margin-right: 0.75rem; display: inline-flex; align-items: center;">
          <span class="icon" style="width: 1.4rem; height: 1.4rem; color: var(--accent); display: inline-flex; align-items: center; justify-content: center;" aria-hidden="true">
            <svg viewBox="0 0 52 52" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.2,11.6h17.6c0.9,0,1.6-0.7,1.6-1.6V6.8c0-2.6-2.2-4.8-4.8-4.8H20.4c-2.6,0-4.8,2.2-4.8,4.8V10C15.6,10.9,16.3,11.6,17.2,11.6z"/>
              <path d="M43.6,6H42c-0.5,0-0.8,0.3-0.8,0.8V10c0,3.5-2.9,6.4-6.4,6.4H17.2c-3.5,0-6.4-2.9-6.4-6.4V6.8C10.8,6.3,10.5,6,10,6H8.4c-2.6,0-4.8,2.2-4.8,4.8v34.4c0,2.6,2.2,4.8,4.8,4.8h35.2c2.6,0,4.8-2.2,4.8-4.8V10.8C48.4,8.2,46.2,6,43.6,6z M37.5,44.1l-1,1c-0.3,0.3-0.7,0.3-1,0l-6.5-6.5c-1.9,1.3-4.2,2-6.7,1.6c-4.2-0.6-7.5-4.1-7.9-8.3c-0.6-5.8,4.3-10.7,10.1-10.1c4.3,0.4,7.7,3.7,8.3,7.9c0.4,2.5-0.3,4.9-1.6,6.7l6.5,6.5C37.8,43.3,37.8,43.7,37.5,44.1z"/>
              <path d="M23.5,24.8c-3.5,0-6.3,2.9-6.3,6.3c0,3.5,2.8,6.3,6.3,6.3c3.5,0,6.3-2.8,6.3-6.3C29.8,27.6,27,24.8,23.5,24.8z"/>
            </svg>
          </span>
        </a>
        <div>
          <h1>Investigation graph</h1>
        </div>
      </div>
      <div class="app-header__actions">
        <a href="/settings.html" class="btn btn--ghost btn--sm">Settings</a>
      </div>
    </header>
    <main class="graph-main">
      <div class="card" style="margin-bottom: 1rem">
        <div class="card__body" style="display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center">
          <button type="button" class="btn btn--primary" id="btn-rebuild">Rebuild</button>
          <button type="button" class="btn btn--ghost" id="btn-refresh">Refresh</button>
          <button type="button" class="btn btn--ghost" id="btn-reset-view">Reset view</button>
          <span class="muted" id="graph-meta" style="font-size: 0.85rem"></span>
        </div>
      </div>
      <div class="card graph-canvas-wrap">
        <div class="graph-canvas-viewport" id="graph-viewport">
          <canvas id="graph-canvas" width="1400" height="780" aria-label="Entity graph"></canvas>
          <div
            class="graph-node-popup"
            id="graph-node-popup"
            role="dialog"
            aria-label="Node details"
            hidden
          >
            <div class="graph-node-popup__head" id="graph-popup-title"></div>
            <div class="graph-node-popup__primary" id="graph-popup-primary"></div>
            <ul class="graph-node-popup__hints" id="graph-popup-hints" hidden></ul>
            <div class="graph-node-popup__actions">
              <button type="button" class="btn btn--sm btn--ghost" id="graph-btn-enrich">Enrich</button>
              <a class="btn btn--sm btn--primary" id="graph-btn-open" href="#" target="_blank" rel="noopener"
                >Open</a
              >
              <button type="button" class="btn btn--sm btn--ghost" id="graph-popup-close">Close</button>
            </div>
          </div>
        </div>
      </div>
      <p class="graph-header-hint" style="margin-top: 0.75rem">
        Layout: d3-force. Drag background to pan · scroll to zoom · drag nodes to nudge · click node for details. Colors: person, phone, address.
      </p>
    </main>
    <script src="/graph.js" defer></script>
  </body>
</html>
